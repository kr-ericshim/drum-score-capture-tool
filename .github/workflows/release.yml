name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_glob: dist/*.exe
          - os: macos-14
            artifact_glob: dist/*.dmg

    runs-on: ${{ matrix.os }}

    env:
      DRUMSHEET_ENABLE_SIGNING: "false"
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Prepare bundled backend runtime
        shell: bash
        run: |
          python -m venv backend/.venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            VENV_PY="backend/.venv/Scripts/python.exe"
          else
            VENV_PY="backend/.venv/bin/python"
          fi
          "$VENV_PY" -m pip install --upgrade pip setuptools wheel
          "$VENV_PY" -m pip install -r backend/requirements.txt
          "$VENV_PY" -c "import fastapi, uvicorn, numpy, cv2, PIL, yt_dlp, pydantic"

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Verify locale bootstrap policy
        working-directory: desktop
        shell: bash
        run: |
          if [ -f renderer/modules/i18n.js ] && [ -f scripts/check-locale-init.js ]; then
            npm run check:locale-init
          else
            echo "Skipping locale bootstrap policy check because locale bootstrap files are not present on this branch."
          fi

      - name: Build release artifacts
        working-directory: desktop
        run: npm run dist:release

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_glob }}
            dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
